name: Deploy Automático a Servidores

on:
  push:
    branches:
      - develop
      - main

# Evita dos despliegues simultáneos de la misma rama
concurrency:
  group: deploy-${{ github.ref }}

jobs:
  # ================== CI: construir y publicar imágenes ==================
  # Corre en un runner de GitHub (nube): compila las 5 imágenes y las
  # publica en Docker Hub. Si esto falla, el deploy no se ejecuta (needs).
  build:
    name: CI - Construir y publicar imágenes
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: 2. Iniciar sesión en Docker Hub (Registro Público)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Compilar y Subir Imágenes
        run: |
          # Compilando el Procesador de Transacciones (Servicio 1)
          docker build -t ${{ secrets.DOCKER_USER }}/procesador-transacciones:latest ./servicio-1-procesador
          docker push ${{ secrets.DOCKER_USER }}/procesador-transacciones:latest

          # Compilando el Validador Antifraude (Servicio 2)
          docker build -t ${{ secrets.DOCKER_USER }}/validador-antifraude:latest ./servicio-2-validador
          docker push ${{ secrets.DOCKER_USER }}/validador-antifraude:latest

          # Compilando la Emisión de Comprobantes (Servicio 3)
          docker build -t ${{ secrets.DOCKER_USER }}/emision-comprobantes:latest ./servicio-3-comprobantes
          docker push ${{ secrets.DOCKER_USER }}/emision-comprobantes:latest

          # Compilando el API Gateway
          docker build -t ${{ secrets.DOCKER_USER }}/api-gateway-pagos:latest ./api-gateway
          docker push ${{ secrets.DOCKER_USER }}/api-gateway-pagos:latest

          # Compilando el Frontend
          docker build -t ${{ secrets.DOCKER_USER }}/frontend-pagos:latest ./frontend
          docker push ${{ secrets.DOCKER_USER }}/frontend-pagos:latest

  # ================== CD: desplegar al cluster K3s ==================
  # El firewall de la universidad bloquea SSH ENTRANTE desde los runners
  # de GitHub (Azure), así que el deploy no puede hacerse con ssh-action.
  # Solución: un runner self-hosted instalado en la VM1. El runner abre
  # una conexión SALIENTE hacia GitHub (eso el firewall sí lo permite),
  # recibe este job y lo ejecuta localmente, donde kubectl sí tiene
  # acceso directo al cluster K3s. Deploy 100% automatizado desde Actions.
  deploy:
    name: CD - Desplegar en el cluster K3s
    needs: build
    runs-on: self-hosted

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: 2. Aplicar manifiestos en el namespace correspondiente
        run: |
          # develop -> QA / main -> PROD
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            ESPACIO=grupo3-prod
            INGRESS=ingress-prod.yml
          else
            ESPACIO=grupo3-qa
            INGRESS=ingress-qa.yml
          fi
          echo "Desplegando en el namespace: $ESPACIO"

          export KUBECONFIG=$HOME/.kube/config
          export PATH=$PATH:/usr/local/bin

          # Copia de trabajo de los manifiestos con el usuario real de Docker Hub
          rm -rf /tmp/k8s-deploy
          cp -r k8s /tmp/k8s-deploy
          find /tmp/k8s-deploy -name '*.yml' -exec sed -i "s|DOCKERHUB_USER|${{ secrets.DOCKER_USER }}|g" {} +

          k3s kubectl apply -f /tmp/k8s-deploy/namespaces.yml
          k3s kubectl apply -n $ESPACIO \
            -f /tmp/k8s-deploy/databases/ \
            -f /tmp/k8s-deploy/rabbitmq.yml \
            -f /tmp/k8s-deploy/servicio-1.yml \
            -f /tmp/k8s-deploy/servicio-2.yml \
            -f /tmp/k8s-deploy/servicio-3.yml \
            -f /tmp/k8s-deploy/gateway.yml \
            -f /tmp/k8s-deploy/frontend.yml \
            -f /tmp/k8s-deploy/backup-cronjob.yml \
            -f /tmp/k8s-deploy/logging.yml \
            -f /tmp/k8s-deploy/$INGRESS

          # Fuerza a los pods a bajar las imágenes :latest recién publicadas
          k3s kubectl rollout restart deployment -n $ESPACIO

      - name: 3. Verificar el estado de los pods
        run: |
          export KUBECONFIG=$HOME/.kube/config
          export PATH=$PATH:/usr/local/bin
          if [ "${GITHUB_REF_NAME}" = "main" ]; then ESPACIO=grupo3-prod; else ESPACIO=grupo3-qa; fi
          sleep 15
          k3s kubectl get pods -n $ESPACIO -o wide
