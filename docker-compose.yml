version: '3.8'

services:
  # API Gateway (Nginx) - unico punto de entrada
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:80"
    depends_on:
      - servicio-1-procesador
      - frontend

  # Frontend (formulario de pago + historial)
  frontend:
    build: ./frontend

  # Message Broker (RabbitMQ, con panel de administracion en 15672)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    volumes:
      - ./broker/definitions.json:/etc/rabbitmq/definitions.json:ro

  # Base de Datos - Servicio 1 (Procesador)
  db-procesador:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transacciones_db
    ports:
      - "5432:5432"

  # Base de Datos - Servicio 2 (Validador Antifraude)
  db-validador:
    image: postgres:15-alpine
    container_name: db_antifraude
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: antifraude_db
    ports:
      - "5433:5432"
    volumes:
      - ./servicio-2-validador/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Base de Datos - Servicio 3 (Emisión de Comprobantes)
  db-comprobantes:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comprobantes_db
    ports:
      - "5434:5432"

  # Microservicio 1: Procesador de Transacciones (REST + Eventos)
  servicio-1-procesador:
    build: ./servicio-1-procesador
    container_name: app_procesador
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db-procesador:5432/transacciones_db
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq
      - PORT=3001
    depends_on:
      - db-procesador
      - rabbitmq

  # Microservicio 2: Lógica de Validador Antifraude (Node.js)
  servicio-2-validador:
    build: ./servicio-2-validador
    container_name: app_antifraude
    environment:
      - DB_HOST=db-validador
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=antifraude_db
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq
    depends_on:
      - db-validador
      - rabbitmq

  # Microservicio 3: Emisión de Comprobantes (Node.js)
  servicio-3-comprobantes:
    build: ./servicio-3-comprobantes
    container_name: app_comprobantes
    environment:
      - DB_HOST=db-comprobantes
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=comprobantes_db
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq
    depends_on:
      - db-comprobantes
      - rabbitmq
