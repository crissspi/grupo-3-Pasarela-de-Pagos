# Servicio 2: Validador Antifraude (Event Driven, sin API HTTP)
# 2 replicas: RabbitMQ reparte los mensajes entre consumidores (competing consumers)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-2-validador
spec:
  replicas: 2
  # Rolling update ordenado: mantiene siempre un consumidor conectado al broker
  # durante el despliegue (no se acumulan mensajes sin procesar).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: servicio-2-validador
  template:
    metadata:
      labels:
        app: servicio-2-validador
    spec:
      # Reparte las 2 replicas entre las 2 VMs (alta disponibilidad)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: servicio-2-validador
      containers:
        - name: servicio-2
          image: DOCKERHUB_USER/validador-antifraude:latest
          imagePullPolicy: Always
          env:
            - name: RABBITMQ_URL
              value: amqp://admin:admin123@rabbitmq
            - name: DB_HOST
              value: db-svc2
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: antifraude_db

