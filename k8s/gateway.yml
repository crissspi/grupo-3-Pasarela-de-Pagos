# API Gateway: unico punto de entrada del sistema
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  # Rolling update con cero downtime (ver servicio-1.yml)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      # Reparte las 2 replicas entre las 2 VMs (alta disponibilidad)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: api-gateway
      containers:
        - name: api-gateway
          image: DOCKERHUB_USER/api-gateway-pagos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          # nginx arranca rapido -> readiness a los 5s. Golpea /health (definido
          # en nginx.conf como "return 200"). Si falla, el pod sale del balanceo.
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway   # el Ingress apunta aqui
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
