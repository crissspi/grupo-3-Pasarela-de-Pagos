# Base de datos EXCLUSIVA del Servicio 2 (antifraude / tarjetas)
# ConfigMap con el init.sql: crea la tabla de tarjetas con saldos de prueba
# (postgres lo ejecuta automaticamente la primera vez que inicializa el volumen)
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-svc2-init
data:
  init.sql: |
    CREATE TABLE tarjetas (
        numero VARCHAR(12) PRIMARY KEY,
        cvc VARCHAR(4) NOT NULL,
        saldo NUMERIC NOT NULL
    );
    INSERT INTO tarjetas (numero, cvc, saldo) VALUES ('111122223333', '123', 500000);
    INSERT INTO tarjetas (numero, cvc, saldo) VALUES ('444455556666', '999', 1500);
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-svc2-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-svc2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-svc2
  template:
    metadata:
      labels:
        app: db-svc2
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: antifraude_db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-svc2-data
        - name: init
          configMap:
            name: db-svc2-init
---
apiVersion: v1
kind: Service
metadata:
  name: db-svc2
spec:
  selector:
    app: db-svc2
  ports:
    - port: 5432
